<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">

    <title>Weather App</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">


</head>

<body>

    <div class="weather-card">

        <h3 class="text-center mb-3">Weather App</h3>

        <input type="text" id="cityInput" class="form-control mb-3" placeholder="Enter city name">

        <button id="getWeather" class="btn btn-primary w-100">
            Get Weather
        </button>

        <div id="weatherResult" class="text-center">

            <h4 id="cityName"></h4>
            <p id="temperature"></p>
            <p id="description"></p>

        </div>

    </div>
    <script src="scriptweather.js"></script>
</body>

</html>
